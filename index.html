<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McDo Sync - Neon Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --mcd-yellow: #ffb700;
    --mcd-red: #ff2222;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    /* Utilisation directe de ton image uploadée sur GitHub en arrière-plan */
    background: linear-gradient(rgba(10, 4, 2, 0.6), rgba(10, 4, 2, 0.75)), 
                url('./96241d07-273b-444f-8b1d-87a619c7051b.png') no-repeat center center fixed;
    background-size: cover;
    font-family: 'Rajdhani', sans-serif;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    position: relative;
  }

  /* Effet de pulsation lumineuse globale qui fait vibrer les néons de ton image */
  body::after {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle, rgba(255,183,0,0.18) 0%, rgba(255,34,34,0.08) 60%, transparent 100%);
    pointer-events: none;
    animation: neonPulseBg 3s ease-in-out infinite alternate;
  }

  @keyframes neonPulseBg {
    0% { opacity: 0.3; filter: brightness(0.9); }
    100% { opacity: 1; filter: brightness(1.25); }
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: rgba(12, 6, 3, 0.82);
    backdrop-filter: blur(14px);
    border: 2px solid var(--mcd-yellow);
    border-radius: 24px;
    padding: 40px 30px;
    text-align: center;
    box-shadow: 
      0 0 35px rgba(255, 183, 0, 0.4),
      inset 0 0 20px rgba(255, 183, 0, 0.1);
    position: relative;
    z-index: 2;
    animation: cardGlow 4s ease-in-out infinite alternate;
  }

  @keyframes cardGlow {
    0% { box-shadow: 0 0 25px rgba(255, 183, 0, 0.3), inset 0 0 15px rgba(255, 183, 0, 0.1); }
    100% { box-shadow: 0 0 50px rgba(255, 183, 0, 0.8), 0 0 20px rgba(255, 34, 34, 0.4); }
  }

  .badge-mcd {
    font-size: 42px;
    margin-bottom: 10px;
    display: inline-block;
    animation: floatBurger 2.5s ease-in-out infinite;
  }

  @keyframes floatBurger {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  h1 { 
    font-family: 'Orbitron', sans-serif;
    font-size: 36px; 
    font-weight: 900;
    margin-bottom: 5px;
    letter-spacing: 2px;
    color: #fff;
    text-shadow: 
      0 0 10px #fff,
      0 0 20px var(--mcd-yellow),
      0 0 40px var(--mcd-red);
  }

  p.subtitle { 
    font-size: 15px; 
    color: #ffcc99; 
    margin-bottom: 30px; 
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .input-group {
    position: relative;
    margin-bottom: 25px;
  }

  input {
    width: 100%;
    padding: 16px 20px;
    background: rgba(0, 0, 0, 0.75);
    border: 2px solid rgba(255, 183, 0, 0.4);
    border-radius: 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--mcd-yellow);
    outline: none;
    transition: all 0.3s ease;
    text-align: center;
    letter-spacing: 1px;
  }

  input::placeholder { 
    color: rgba(255, 255, 255, 0.3); 
  }

  input:focus {
    border-color: var(--mcd-yellow);
    box-shadow: 0 0 20px rgba(255, 183, 0, 0.6);
  }

  button {
    width: 100%;
    padding: 18px;
    background: transparent;
    border: 2px solid var(--mcd-yellow);
    border-radius: 14px;
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 900;
    color: var(--mcd-yellow);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    box-shadow: 0 0 15px rgba(255, 183, 0, 0.3);
  }

  button:hover {
    background: var(--mcd-yellow);
    color: #000;
    box-shadow: 0 0 30px var(--mcd-yellow), 0 0 60px var(--mcd-red);
    border-color: #fff;
  }

  button:active { 
    transform: scale(0.97); 
  }

  .instructions {
    margin-top: 25px;
    font-size: 14px;
    color: #ffcc99;
    line-height: 1.6;
    background: rgba(255, 34, 34, 0.1);
    border: 1px solid rgba(255, 183, 0, 0.2);
    padding: 14px;
    border-radius: 12px;
    text-align: left;
    font-weight: 600;
  }

  .instructions b {
    color: var(--mcd-yellow);
  }
</style>
</head>
<body>
<div class="card">
  <div class="badge-mcd">🍔🍟</div>
  <h1>MC_SYNC</h1>
  <p class="subtitle">Le planning officiel du Crew</p>

  <div class="input-group">
    <input id="sourceUrl" type="text" placeholder="Colle ton lien EasyAtWork ici">
  </div>
  
  <button id="installBtn">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
      <polyline points="22 4 12 14.01 9 11.01"></polyline>
    </svg>
    Générer mon Planning
  </button>

  <div class="instructions">
    <b>1.</b> Colle ton lien EasyAtWork personnel.<br>
    <b>2.</b> Clique sur le bouton pour propulser le planning.<br>
    <b>3.</b> Valide l'abonnement direct sur ton iPhone !
  </div>
</div>

<script>
  var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvA1clsrUgX3AyyUd6J6vhJgULF5Mox1KgC5WkMyvktXYmvRVhUEHAlFhK1wgRcnVnuA/exec";

  document.getElementById('installBtn').addEventListener('click', function() {
    var url = document.getElementById('sourceUrl').value.trim();
    
    if (!url) {
      alert("⚠️ N'oublie pas de coller ton lien EasyAtWork chef !");
      return;
    }
    
    if (!url.includes('api_token')) {
      alert("❌ Ce lien ne semble pas valide. Vérifie que tu as tout copié.");
      return;
    }
    
    var btn = this;
    var originalText = btn.innerHTML;
    btn.innerHTML = '⚡ SYNCHRONISATION...';
    btn.style.background = 'var(--mcd-red)';
    btn.style.borderColor = 'var(--mcd-red)';
    btn.style.color = '#fff';
    btn.style.boxShadow = '0 0 30px var(--mcd-red)';
    
    setTimeout(function() {
      var encodedUrl = encodeURIComponent(url);
      var webcalUrl = SCRIPT_URL.replace(/^https/i, 'webcal') + "?sourceUrl=" + encodedUrl;
      window.location.href = webcalUrl;
      
      setTimeout(function() {
        btn.innerHTML = originalText;
        btn.style = '';
      }, 2000);
    }, 600);
  });
</script>
</body>
</html>
