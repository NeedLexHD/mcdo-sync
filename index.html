<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McDo Sync - Ultimate Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --mcd-red: #da291c;
    --mcd-yellow: #ffc72c;
    --mcd-dark: #121212;
    --glow-yellow: rgba(255, 199, 44, 0.6);
    --glow-red: rgba(218, 41, 28, 0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: radial-gradient(circle at center, #261111 0%, var(--mcd-dark) 100%);
    font-family: 'Rajdhani', sans-serif;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* Effet de grille cyberpunk animée en arrière-plan */
  body::before {
    content: "";
    position: absolute;
    width: 200%; height: 200%;
    background-image: linear-gradient(rgba(255, 199, 44, 0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255, 199, 44, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    z-index: -1;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: rgba(18, 18, 18, 0.85);
    backdrop-filter: blur(16px);
    border: 2px solid var(--mcd-yellow);
    border-radius: 24px;
    padding: 40px 30px;
    text-align: center;
    box-shadow: 
      0 0 30px var(--glow-yellow),
      inset 0 0 20px rgba(255, 199, 44, 0.1);
    position: relative;
    animation: cardPulse 4s ease-in-out infinite alternate;
  }

  @keyframes cardPulse {
    0% { box-shadow: 0 0 20px var(--glow-yellow), inset 0 0 15px rgba(255, 199, 44, 0.1); }
    100% { box-shadow: 0 0 45px rgba(255, 199, 44, 0.9), inset 0 0 25px rgba(255, 199, 44, 0.25); }
  }

  /* Badge iconique McDo flottant */
  .badge-mcd {
    font-size: 42px;
    margin-bottom: 10px;
    display: inline-block;
    animation: floatBurger 2.5s ease-in-out infinite;
  }

  @keyframes floatBurger {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-8px) rotate(5deg); }
  }

  h1 { 
    font-family: 'Orbitron', sans-serif;
    font-size: 36px; 
    font-weight: 900;
    margin-bottom: 5px;
    letter-spacing: 2px;
    color: var(--mcd-yellow);
    text-shadow: 0 0 10px var(--glow-yellow), 0 0 20px var(--mcd-red);
  }

  p.subtitle { 
    font-size: 15px; 
    color: #ffebad; 
    margin-bottom: 30px; 
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .input-group {
    position: relative;
    margin-bottom: 25px;
  }

  input {
    width: 100%;
    padding: 16px 20px;
    background: rgba(0, 0, 0, 0.7);
    border: 2px solid rgba(255, 199, 44, 0.4);
    border-radius: 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--mcd-yellow);
    outline: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    text-align: center;
    letter-spacing: 1px;
  }

  input::placeholder { 
    color: rgba(255, 255, 255, 0.3); 
    font-weight: 600;
  }

  input:focus {
    border-color: var(--mcd-yellow);
    box-shadow: 0 0 20px var(--glow-yellow);
    transform: scale(1.02);
  }

  button {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--mcd-yellow), #ffa200);
    border: none;
    border-radius: 14px;
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 900;
    color: #000;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 20px rgba(255, 199, 44, 0.4);
    position: relative;
    overflow: hidden;
  }

  button::after {
    content: '';
    position: absolute;
    top: -50%; left: -50%; width: 200%; height: 200%;
    background: linear-gradient(transparent, rgba(255,255,255,0.4), transparent);
    transform: rotate(45deg) translateX(-100%);
    transition: 0.6s;
  }

  button:hover::after {
    transform: rotate(45deg) translateX(100%);
  }

  button:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 6px 30px var(--glow-yellow), 0 0 20px var(--mcd-red);
    background: #fff;
    color: var(--mcd-red);
  }

  button:active { 
    transform: scale(0.97); 
  }

  .instructions {
    margin-top: 25px;
    font-size: 14px;
    color: #ffebad;
    line-height: 1.6;
    background: rgba(218, 41, 28, 0.15);
    border: 1px solid rgba(255, 199, 44, 0.25);
    padding: 14px;
    border-radius: 12px;
    text-align: left;
    font-weight: 600;
  }

  .instructions b {
    color: var(--mcd-yellow);
  }
</style>
</head>
<body>
<div class="card">
  <div class="badge-mcd">🍟🍔</div>
  <h1>MC_SYNC</h1>
  <p class="subtitle">Le planning officiel du Crew</p>

  <div class="input-group">
    <input id="sourceUrl" type="text" placeholder="Colle ton lien EasyAtWork ici">
  </div>
  
  <button id="installBtn">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
      <polyline points="22 4 12 14.01 9 11.01"></polyline>
    </svg>
    Générer mon Planning
  </button>

  <div class="instructions">
    <b>1.</b> Colle ton lien EasyAtWork personnel.<br>
    <b>2.</b> Clique sur le bouton pour propulser le planning.<br>
    <b>3.</b> Valide l'abonnement direct sur ton iPhone !
  </div>
</div>

<script>
  var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvA1clsrUgX3AyyUd6J6vhJgULF5Mox1KgC5WkMyvktXYmvRVhUEHAlFhK1wgRcnVnuA/exec";

  document.getElementById('installBtn').addEventListener('click', function() {
    var url = document.getElementById('sourceUrl').value.trim();
    
    if (!url) {
      alert("⚠️ N'oublie pas de coller ton lien EasyAtWork chef !");
      return;
    }
    
    if (!url.includes('api_token')) {
      alert("❌ Ce lien ne semble pas valide. Vérifie que tu as tout copié.");
      return;
    }
    
    var btn = this;
    var originalText = btn.innerHTML;
    btn.innerHTML = '⚡ SYNCHRONISATION...';
    btn.style.background = 'var(--mcd-red)';
    btn.style.color = '#fff';
    btn.style.boxShadow = '0 0 30px var(--mcd-red)';
    
    setTimeout(function() {
      var encodedUrl = encodeURIComponent(url);
      var webcalUrl = SCRIPT_URL.replace(/^https/i, 'webcal') + "?sourceUrl=" + encodedUrl;
      window.location.href = webcalUrl;
      
      setTimeout(function() {
        btn.innerHTML = originalText;
        btn.style = '';
      }, 2000);
    }, 600);
  });
</script>
</body>
</html>
